<!DOCTYPE html>
<html>
<head>
  <title>For You 💖</title>

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: Arial;
      overflow: hidden;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      color: white;
    }

    .bg {
      position: fixed;
      width: 100%;
      height: 100%;
      background-size: cover;
      background-position: center;
      filter: blur(20px) brightness(0.5);
      z-index: -2;
      transition: opacity 2s ease-in-out;
    }

    #bg1 { opacity: 1; }
    #bg2 { opacity: 0; }

    .card {
      backdrop-filter: blur(20px);
      background: rgba(255, 255, 255, 0.08);
      padding: 40px;
      border-radius: 25px;
      text-align: center;
      box-shadow: 0 0 40px rgba(255, 192, 203, 0.3);
      max-width: 400px;
    }

    h1 {
      color: #ff9bb3;
      text-shadow: 0 0 10px pink;
    }

    #line {
      margin-top: 10px;
      font-size: 15px;
    }

    #dailyQuote {
      margin-top: 15px;
      font-size: 17px;
      color: #ffd1dc;
      font-style: italic;
      text-shadow: 0 0 10px pink;
    }

    #countdown {
      margin-top: 20px;
      font-size: 24px;
      text-shadow: 0 0 10px pink;
    }

    .heart {
      position: absolute;
      color: pink;
      animation: float 6s linear infinite;
    }

    @keyframes float {
      0% { transform: translateY(100vh); opacity: 0; }
      50% { opacity: 1; }
      100% { transform: translateY(-10vh); opacity: 0; }
    }
  </style>
</head>

<body>

<div id="bg1" class="bg"></div>
<div id="bg2" class="bg"></div>

<div class="card">
  <h1 id="title"></h1>
  <p id="line"></p>
  <p id="dailyQuote"></p>
  <div id="countdown"></div>
</div>

<audio autoplay loop>
  <source src="music.mp3" type="audio/mpeg">
</audio>

<script>
// 🌄 BACKGROUND
let images = ["photo1.jpg","photo2.jpg","photo3.jpg"];
let bg1 = document.getElementById("bg1");
let bg2 = document.getElementById("bg2");

let i = 0;
bg1.style.backgroundImage = `url(${images[0]})`;

setInterval(() => {
  i = (i + 1) % images.length;
  bg2.style.backgroundImage = `url(${images[i]})`;
  bg2.style.opacity = 1;
  bg1.style.opacity = 0;

  setTimeout(() => {
    bg1.style.backgroundImage = bg2.style.backgroundImage;
    bg1.style.opacity = 1;
    bg2.style.opacity = 0;
  }, 2000);

}, 6000);

// 🎂 COUNTDOWN + QUOTES
function startCountdown() {

  let quotes = [
    "Some people don’t try to stand out… they just quietly do 💫",
    "There’s something calm about you… like everything slows down a little 🌙",
    "You don’t say much sometimes… but it still feels like enough 💖",
    "It’s strange how some people become familiar so quickly ✨",
    "Maybe it was just a normal day… but it didn’t feel like one 🌸",
    "That night… still crosses my mind sometimes 🌙",
    "I didn’t realize when it changed… but something did 💫",
    "It's your day today… but somewhere along the way, you became more than just a day to remember 💖"
  ];

  let el = document.getElementById("countdown");
  let title = document.getElementById("title");
  let line = document.getElementById("line");
  let quoteEl = document.getElementById("dailyQuote");

  function update() {

    let now = new Date();
    let birthday = new Date(now.getFullYear(), 3, 25);

    if (now > birthday) birthday = new Date(now.getFullYear()+1,3,25);

    let diff = birthday - now;

    let d = Math.floor(diff / (1000*60*60*24));
    let h = Math.floor((diff/(1000*60*60))%24);
    let m = Math.floor((diff/(1000*60))%60);
    let s = Math.floor((diff/1000)%60);

    el.innerText = `${d} Days ${h} Hours ${m} Min ${s} Sec`;

    // 🔥 DAILY QUOTE LOGIC (SIMPLE + PERFECT)
    let startDate = new Date(2026, 3, 18); // April 18
    let today = new Date(now.getFullYear(), now.getMonth(), now.getDate());

    let dayIndex = Math.floor((today - startDate)/(1000*60*60*24));

    // ✅ Always valid index
    if (dayIndex < 0) dayIndex = 0;
    if (dayIndex >= quotes.length) dayIndex = quotes.length - 1;

    quoteEl.innerText = quotes[dayIndex];

    // 🎂 TITLE
    if (now.getDate() === 25 && now.getMonth() === 3) {
      title.innerText = "🎉 Many More Happy Returns 🎂";
      line.innerText = "Today is all about you… De ❤️";
    } else {
      title.innerText = "💖 Advance Happy Birthday 💖";
      line.innerText = "Counting days for you… De ❤️";
    }
  }

  update();
  setInterval(update,1000);
}

// ❤️ HEARTS
setInterval(()=>{
  let h=document.createElement("div");
  h.className="heart";
  h.innerText="❤️";
  h.style.left=Math.random()*100+"vw";
  document.body.appendChild(h);
  setTimeout(()=>h.remove(),6000);
},500);

startCountdown();
</script>

</body>
</html>
